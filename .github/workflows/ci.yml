name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Tests run against in-memory H2 (src/test/resources/application-test.yml),
      # so no database service is needed here.
      - name: Build & test
        run: ./mvnw -B --no-transfer-progress verify

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run lint` runs eslint with --fix (mutates); in CI we only check.
      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npm run type-check

      - name: Test
        run: npm run test:unit

      - name: Build
        run: npm run build

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ubuntu-latest ships none of the browser libraries, so install the
      # browsers matching @playwright/test together with their system deps.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # playwright.config.mjs boots `npm run preview` on CI, which serves the
      # built dist/, so the app has to be built first.
      - name: Build
        run: npm run build

      # Node 17+ resolves `localhost` to IPv6 (::1) first, but `vite preview`
      # binds IPv4 (127.0.0.1), so Playwright's webServer readiness probe hits
      # ::1 and times out. Force IPv4-first so the probe and preview agree.
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
